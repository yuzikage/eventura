openapi: 3.0.3

info:
  title: Eventura API
  description: |
    REST API for the Eventura Event Management Platform.
    A small business event management system supporting customers,
    event managers, and administrators.
 
    ## Authentication
    Most endpoints require a Bearer JWT token in the Authorization header.
    Obtain a token by calling POST /api/v1/auth/login.
 
    ## User Roles
    - **customer** — can plan events, create bookings, view own bookings
    - **manager** — can view all bookings, update booking status
    - **admin** — full access including venue and content management
 
    ## User Stories Mapped to Endpoints
 
    | Story | Description | Endpoints |
    |-------|-------------|-----------|
    | US-C1 | Customer can plan event online (wizard steps) | GET /event-types, GET /venues, GET /themes, GET /packages/*, POST /bookings |
    | US-C2 | Customer can schedule a meeting with event manager | POST /bookings (meeting_date + meeting_time), GET /bookings/slots |
    | US-C3 | Customer can interact with AI chatbot | POST /chat |
    | US-C4 | Customer can compare packages | GET /packages/events, GET /packages/photography, GET /packages/catering |
    | US-C5 | Customer can see theme visual preview | GET /themes (images array) |
    | US-C6 | Customer can input guest count and see cost changes | GET /packages/catering (price_per_head × guest_count) |
    | US-C7 | Customer can get an AI-powered event recommendation | POST /ai/recommend |
    | US-M1 | Manager can view all scheduled bookings | GET /bookings/all, PATCH /bookings/{id}/status |
    | US-M2 | Manager can see customer selections | GET /bookings/{id} (full expanded objects) |
    | US-M3 | Manager can receive notifications about new bookings | GET /bookings/all?status=pending |
    | US-M4 | Manager can be notified of scheduling conflicts | GET /bookings/conflicts |
    | US-M5 | Manager can view an AI-generated review of a booking | GET /bookings/{id}/review |
    | US-A1 | Admin can monitor bookings and analytics | GET /admin/stats, GET /bookings/all |
    | US-A2 | Admin can see revenue reports | GET /admin/revenue |
    | US-A3 | Admin can update venues, themes, and packages | POST/PUT/DELETE /venues, /themes, /packages/* |
 
    ## Sprint 2 Changes
 
    The following features were added in Sprint 2 based on user feedback:
 
    - **RAG-based chatbot** (`POST /chat`) — upgraded to inject semantically
      relevant knowledge chunks (policies, FAQs, planning tips) alongside live
      DB data on every request. Response shape unchanged.
    - **AI Event Recommender** (`POST /ai/recommend`) — new endpoint. Customer
      describes their event in plain language and receives a fully specified
      recommendation (venue, theme, all three packages) with reasons. Includes
      budget and capacity validation.
    - **Manager Booking Review** (`GET /bookings/{id}/review`) — new endpoint.
      Returns an AI-generated structured assessment of a booking with flags for
      issues such as capacity concerns or approaching event dates, and a
      suggested next action for the manager.
 
  version: "2.0.0"
  contact:
    name: Techtonics — IITM BS Software Engineering

servers:
  - url: http://localhost:5000/api/v1
    description: Local development server

tags:
  - name: Auth
    description: Customer and staff authentication
  - name: Event Types
    description: Event type listings (Wedding, Birthday, Corporate etc.)
  - name: Venues
    description: Venue listings and management
  - name: Themes
    description: Event theme listings and management
  - name: Packages
    description: Event, photography and catering packages
  - name: Bookings
    description: Create and manage event bookings
  - name: Admin
    description: Admin-only routes for revenue and analytics
  - name: Chat
    description: AI-powered chatbot powered by Claude Haiku
  - name: AI
    description: AI-powered recommendation and booking review endpoints

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── Auth ──────────────────────────────────────────────────────
    SignupRequest:
      type: object
      required: [name, email, password, phone]
      properties:
        name:
          type: string
          example: Priya Sharma
        email:
          type: string
          format: email
          example: priya@example.com
        password:
          type: string
          minLength: 6
          example: secret123
        phone:
          type: string
          example: "9876543210"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: priya@example.com
        password:
          type: string
          example: secret123

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/User'

    # ── User ──────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name:
          type: string
          example: Priya Sharma
        email:
          type: string
          example: priya@example.com
        phone:
          type: string
          example: "9876543210"
        role:
          type: string
          enum: [customer, manager, admin]
          example: customer
        created_at:
          type: string
          format: date-time

    # ── Event Type ────────────────────────────────────────────────
    EventType:
      type: object
      properties:
        id:
          type: string
          example: et1
        label:
          type: string
          example: Wedding
        description:
          type: string
          example: Intimate to grand celebrations
        icon:
          type: string
          example: "💍"

    # ── Venue ─────────────────────────────────────────────────────
    Venue:
      type: object
      properties:
        id:
          type: string
          example: v1
        name:
          type: string
          example: The Grand Pavilion
        location:
          type: string
          example: Coochbehar Central
        capacity:
          type: integer
          example: 500
        price:
          type: number
          example: 120000.0
        is_available:
          type: boolean
          example: true

    VenueRequest:
      type: object
      required: [name, location, capacity, price]
      properties:
        name:
          type: string
          example: The Grand Pavilion
        location:
          type: string
          example: Coochbehar Central
        capacity:
          type: integer
          example: 500
        price:
          type: number
          example: 120000.0
        is_available:
          type: boolean
          default: true

    # ── Theme ─────────────────────────────────────────────────────
    Theme:
      type: object
      properties:
        id:
          type: string
          example: t1
        name:
          type: string
          example: Royal Marigold
        description:
          type: string
          example: Warm golds and deep saffron
        is_active:
          type: boolean
          example: true
        images:
          type: array
          items:
            type: string
          example:
            - https://images.unsplash.com/photo-1519225421980?w=900
            - https://images.unsplash.com/photo-1583939003579?w=900

    ThemeRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Royal Marigold
        description:
          type: string
          example: Warm golds and deep saffron
        is_active:
          type: boolean
          default: true
        images:
          type: array
          items:
            type: string
          description: List of image URLs for the theme carousel

    # ── Packages ──────────────────────────────────────────────────
    EventPackage:
      type: object
      properties:
        id:
          type: string
          example: pk1
        label:
          type: string
          example: Premium
        price:
          type: number
          example: 35000.0
        features:
          type: array
          items:
            type: string
          example: ["Premium floral decor", "2 coordinators", "8-hour duration"]
        is_active:
          type: boolean
          example: true

    PhotographyPackage:
      type: object
      properties:
        id:
          type: string
          example: ph1
        label:
          type: string
          example: Cinematic
        price:
          type: number
          example: 32000.0
        features:
          type: array
          items:
            type: string
          example: ["Full-day coverage", "2 photographers + videographer", "Highlight reel"]
        is_active:
          type: boolean
          example: true

    CateringPackage:
      type: object
      properties:
        id:
          type: string
          example: c1
        label:
          type: string
          example: Royal Feast
        price_per_head:
          type: number
          example: 950.0
        features:
          type: array
          items:
            type: string
          example: ["Multi-cuisine spread", "6 starters", "Premium dessert lounge"]
        is_active:
          type: boolean
          example: true

    EventPackageRequest:
      type: object
      required: [label, price]
      properties:
        label:
          type: string
          example: Premium
        price:
          type: number
          example: 35000.0
        features:
          type: array
          items:
            type: string
        is_active:
          type: boolean
          default: true

    PhotographyPackageRequest:
      type: object
      required: [label, price]
      properties:
        label:
          type: string
          example: Cinematic
        price:
          type: number
          example: 32000.0
        features:
          type: array
          items:
            type: string
        is_active:
          type: boolean
          default: true

    CateringPackageRequest:
      type: object
      required: [label, price_per_head]
      properties:
        label:
          type: string
          example: Royal Feast
        price_per_head:
          type: number
          example: 950.0
        features:
          type: array
          items:
            type: string
        is_active:
          type: boolean
          default: true

    # ── Booking ───────────────────────────────────────────────────
    BookingRequest:
      type: object
      required:
        - event_type_id
        - venue_id
        - theme_id
        - guest_count
        - event_package_id
        - photography_package_id
        - catering_package_id
        - event_date
        - meeting_date
        - meeting_time
      properties:
        event_type_id:
          type: string
          example: et1
        venue_id:
          type: string
          example: v1
        theme_id:
          type: string
          example: t1
        guest_count:
          type: integer
          example: 150
        event_package_id:
          type: string
          example: pk2
        photography_package_id:
          type: string
          example: ph2
        catering_package_id:
          type: string
          example: c2
        event_date:
          type: string
          format: date
          description: The actual date the event takes place at the venue. Used for venue conflict detection.
          example: "2026-09-20"
        meeting_date:
          type: string
          format: date
          description: The date of the customer's consultation meeting with the event manager.
          example: "2026-08-15"
        meeting_time:
          type: string
          example: "11:00 AM"
        meeting_notes:
          type: string
          example: Prefer outdoor setup
        total_estimated_cost:
          type: number
          example: 185000.0

    Booking:
      type: object
      properties:
        id:
          type: string
        booking_reference:
          type: string
          example: EVT-A3F2K
        user_id:
          type: string
        event_type_id:
          type: string
        venue_id:
          type: string
        theme_id:
          type: string
        guest_count:
          type: integer
        event_package_id:
          type: string
        photography_package_id:
          type: string
        catering_package_id:
          type: string
        event_date:
          type: string
          format: date
          description: The actual date the event takes place at the venue.
          example: "2026-09-20"
        meeting_date:
          type: string
          format: date
          description: The date of the customer's consultation meeting with the event manager.
          example: "2026-08-15"
        meeting_time:
          type: string
        meeting_notes:
          type: string
        total_estimated_cost:
          type: number
        status:
          type: string
          enum: [pending, confirmed, cancelled]
        created_at:
          type: string
          format: date-time

    BookingStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, confirmed, cancelled]
          example: confirmed

    # ── Chat ──────────────────────────────────────────────────────
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
          example: user
        content:
          type: string
          example: What venues do you have?

    ChatRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          description: |
            Full conversation history — include every user and assistant
            turn since the chat opened. The backend forwards the entire
            array to the AI so context is preserved across turns.

    ChatResponse:
      type: object
      properties:
        reply:
          type: string
          example: "We have three venues available: The Grand Pavilion..."

    # ── Errors ────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Not found
        message:
          type: string
          example: Could not find requested item

    ValidationError:
      type: object
      properties:
        error:
          type: string
          example: Validation error
        messages:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email: ["Not a valid email address"]
            password: ["Shorter than minimum length 6"]

    # ── AI Recommend ──────────────────────────────────────────────
    AIRecommendRequest:
      type: object
      required: [description, guest_count]
      properties:
        description:
          type: string
          minLength: 10
          description: |
            Natural language description of the event. Should include style
            preferences, budget if known, and any specific requirements.
            Must be event-related — irrelevant queries return 400.
          example: "Outdoor wedding for family and friends, warm colours, budget around ₹2 lakhs"
        guest_count:
          type: integer
          minimum: 1
          description: Number of guests. Used for capacity matching and catering cost calculation.
          example: 120
        event_type:
          type: string
          description: Event type label from the wizard (e.g. Wedding, Birthday). Optional but improves recommendation quality.
          example: Wedding
 
    AIRecommendItem:
      type: object
      description: A single recommended item with the reason for the recommendation and the full DB object attached.
      properties:
        id:
          type: string
          description: Exact ID of the recommended item from the database.
          example: v1
        name:
          type: string
          description: Display name (used for venues and themes).
          example: The Grand Pavilion
        label:
          type: string
          description: Display label (used for packages).
          example: Premium
        reason:
          type: string
          description: One sentence explanation of why this item was recommended.
          example: "Fits 120 guests comfortably with room for a stage setup."
        full:
          type: object
          description: |
            Complete database object for this item (same shape as the relevant
            GET endpoint response). Included so the frontend can directly apply
            the recommendation to wizard state without additional lookups.
          additionalProperties: true
 
    AIRecommendResponse:
      type: object
      properties:
        is_relevant:
          type: boolean
          description: Always true for successful responses. False responses return 400 before reaching this point.
          example: true
        venue:
          $ref: '#/components/schemas/AIRecommendItem'
        theme:
          $ref: '#/components/schemas/AIRecommendItem'
        guest_count:
          type: integer
          description: Echoed back from the request.
          example: 120
        event_package:
          $ref: '#/components/schemas/AIRecommendItem'
        photography:
          $ref: '#/components/schemas/AIRecommendItem'
        catering:
          $ref: '#/components/schemas/AIRecommendItem'
        summary:
          type: string
          description: One sentence overview of the full recommendation.
          example: "A Premium wedding at The Grand Pavilion with Royal Marigold theme and Royal Feast catering."
        budget_mentioned:
          type: number
          nullable: true
          description: Budget in rupees extracted from the description, or null if not mentioned.
          example: 200000
        budget_warning:
          type: string
          nullable: true
          description: |
            Warning message when the recommendation exceeds the stated budget by
            more than 20%, or when the budget cannot cover the minimum possible cost.
            Null when no budget was mentioned or the budget is sufficient.
          example: "The recommended combination totals ₹2,15,000, which is above your budget of ₹2,00,000."
        capacity_warning:
          type: string
          nullable: true
          description: |
            Warning message when no venue can accommodate the requested guest count.
            Null when a fitting venue was found (or silently swapped to).
          example: "None of our venues can accommodate 600 guests. Our largest venue fits 300 guests."
        actual_total:
          type: number
          description: Calculated total cost for the recommended combination based on guest count.
          example: 215000.0
 
    # ── Booking Review ────────────────────────────────────────────
    BookingReviewResponse:
      type: object
      properties:
        summary:
          type: string
          description: One sentence overall assessment referencing the booking reference and event type.
          example: "EVT-A3F2K is a confirmed wedding booking at The Grand Pavilion with strong package selections."
        flags:
          type: array
          items:
            type: string
          description: |
            List of specific concerns with actual values from the booking data.
            Empty list if no concerns are found.
          example:
            - "Guest count of 280 is close to venue capacity of 300 — discuss seating plan."
            - "Event date is in 10 days — confirm all vendor arrangements immediately."
        suggestion:
          type: string
          description: One recommended next action for the manager, starting with a verb and referencing the meeting date if present.
          example: "Confirm vendor readiness and contact the customer before the meeting on 2026-08-15."


# ════════════════════════════════════════════════════════════════
# PATHS
# ════════════════════════════════════════════════════════════════
paths:

  # ── AUTH ──────────────────────────────────────────────────────

  /auth/signup:
    post:
      tags: [Auth]
      summary: Register a new customer account
      description: |
        Creates a new user account with role 'customer'.
        Maps to user story **US-C1**.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        201:
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        400:
          description: Validation error — missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        409:
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Conflict
                message: An account with this email already exists

  /auth/login:
    post:
      tags: [Auth]
      summary: Login as customer or staff
      description: |
        Authenticates a user and returns a JWT token.
        The `role` field in the response determines which dashboard to redirect to.
        Maps to user stories **US-C1**, **US-M1**, **US-A1**.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        400:
          description: Missing or invalid request body fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              example:
                error: Validation error
                messages:
                  email: ["Email is required"]
                  password: ["Password is required"]
        401:
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Invalid email or password

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current logged-in user
      description: |
        Returns the profile of the authenticated user.
        Used to restore session on page reload from localStorage token.
      security:
        - BearerAuth: []
      responses:
        200:
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token

  # ── EVENT TYPES ───────────────────────────────────────────────

  /event-types:
    get:
      tags: [Event Types]
      summary: Get all event types
      description: |
        Returns all available event types shown in wizard step 1.
        Examples — Wedding, Birthday, Corporate, Social Event.
        Maps to user story **US-C1**.
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of event types
          content:
            application/json:
              schema:
                type: object
                properties:
                  event_types:
                    type: array
                    items:
                      $ref: '#/components/schemas/EventType'
              example:
                event_types:
                  - id: et1
                    label: Wedding
                    description: Intimate to grand celebrations
                    icon: "💍"
                  - id: et2
                    label: Birthday
                    description: Milestone birthday parties
                    icon: "🎂"
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token

  # ── VENUES ────────────────────────────────────────────────────

  /venues:
    get:
      tags: [Venues]
      summary: Get all available venues
      description: |
        Returns venues where `is_available` is true.
        Used by the event planner wizard step 2.
        Maps to user story **US-C1**.
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of available venues
          content:
            application/json:
              schema:
                type: object
                properties:
                  venues:
                    type: array
                    items:
                      $ref: '#/components/schemas/Venue'
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token

    post:
      tags: [Venues]
      summary: Add a new venue
      description: |
        Admin only. Creates a new venue.
        Maps to user story **US-A3**.
      security:
        - BearerAuth: []
      x-required-roles: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VenueRequest'
      responses:
        201:
          description: Venue created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Venue'
        400:
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              example:
                error: Validation error
                messages:
                  name: ["Venue name is required"]
                  capacity: ["Capacity must be a positive integer"]
                  price: ["Price must be a valid number"]
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token
        403:
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Forbidden
                message: You do not have permission to perform this action

  /venues/all:
    get:
      tags: [Venues]
      summary: Get all venues including unavailable ones
      description: |
        Admin only. Returns all venues regardless of availability.
        Used by the admin venue management page.
        Maps to user story **US-A3**.
      security:
        - BearerAuth: []
      x-required-roles: [admin]
      responses:
        200:
          description: List of all venues
          content:
            application/json:
              schema:
                type: object
                properties:
                  venues:
                    type: array
                    items:
                      $ref: '#/components/schemas/Venue'
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token
        403:
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Forbidden
                message: You do not have permission to perform this action

  /venues/{venue_id}:
    get:
      tags: [Venues]
      summary: Get a single venue by ID
      security:
        - BearerAuth: []
      parameters:
        - name: venue_id
          in: path
          required: true
          schema:
            type: string
          example: v1
      responses:
        200:
          description: Venue details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Venue'
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token
        404:
          description: Venue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not found
                message: Venue with id v99 does not exist

    put:
