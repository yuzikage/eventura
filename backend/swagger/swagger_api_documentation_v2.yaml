  # ── BOOKINGS ──────────────────────────────────────────────────

  /bookings:
    post:
      tags: [Bookings]
      summary: Create a new booking
      description: |
        Customer only. Submits the completed event planner wizard.
        Requires both `event_date` (the actual event day) and
        `meeting_date` + `meeting_time` (the consultation appointment).
        Generates a unique booking reference (e.g. EVT-A3F2K).
        Returns 409 if the venue is already booked on the same `event_date`
        by a non-cancelled booking.
        Maps to user stories **US-C1**, **US-C2**.
      security:
        - BearerAuth: []
      x-required-roles: [customer]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
      responses:
        201:
          description: Booking created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        400:
          description: Validation error — missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              example:
                error: Validation error
                messages:
                  venue_id: ["A venue must be selected"]
                  guest_count: ["Guest count is required for cost calculation"]
                  event_date: ["Please select the date your event will take place"]
                  meeting_date: ["Please select a date for the manager meeting"]
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token
        409:
          description: Venue already booked on selected event date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Conflict
                message: This venue is already booked on the selected event date

  /bookings/my:
    get:
      tags: [Bookings]
      summary: Get all bookings for the logged-in customer
      description: |
        Customer only. Returns all bookings belonging to the
        authenticated user, ordered by `created_at` descending.
        Used by the customer dashboard upcoming and past bookings sections.
        Maps to user story **US-C1**.
      security:
        - BearerAuth: []
      x-required-roles: [customer]
      responses:
        200:
          description: List of customer bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token

  /bookings/all:
    get:
      tags: [Bookings]
      summary: Get all bookings across all customers
      description: |
        Manager and Admin only. Returns all bookings with full
        related objects expanded (user, venue, theme, packages).
        Supports optional `status` filter via query parameter.
        Passing `status=pending` effectively implements a new bookings
        notification feed for managers.
        Used by manager dashboard and admin scheduled events.
        Maps to user stories **US-M1**, **US-M2**, **US-M3**, **US-A1**.
      security:
        - BearerAuth: []
      x-required-roles: [manager, admin]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, confirmed, cancelled]
          description: Filter bookings by status
          example: confirmed
      responses:
        200:
          description: List of all bookings with full details
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token
        403:
          description: Manager or Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Forbidden
                message: You do not have permission to perform this action

  /bookings/conflicts:
    get:
      tags: [Bookings]
      summary: Get all bookings with scheduling conflicts
      description: |
        Manager and Admin only. Returns groups of non-cancelled bookings
        that share the same `venue_id` and `event_date` — indicating a
        genuine double-booking at the same venue on the same day.
        Meeting date and time are not considered for conflict detection.
        Used by the manager alerts section.
        Maps to user story **US-M4**.
      security:
        - BearerAuth: []
      x-required-roles: [manager, admin]
      responses:
        200:
          description: Grouped conflict bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  conflicts:
                    type: array
                    items:
                      type: object
                      properties:
                        venue:
                          type: string
                          description: Venue name
                          example: The Grand Pavilion
                        date:
                          type: string
                          format: date
                          description: The event_date shared by conflicting bookings
                          example: "2026-09-20"
                        bookings:
                          type: array
                          items:
                            $ref: '#/components/schemas/Booking'
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token
        403:
          description: Manager or Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Forbidden
                message: You do not have permission to perform this action

  /bookings/slots:
    get:
      tags: [Bookings]
      summary: Get taken meeting time slots for a venue and date
      description: |
        Authenticated users (all roles). Returns a list of meeting time strings
        that are already taken for the given venue and meeting date.
        Cancelled bookings do not occupy slots.
        Used by the meeting scheduler page to disable already-booked time slots
        in the UI so customers cannot double-book a meeting.
        Maps to user story **US-C2**.
      security:
        - BearerAuth: []
      parameters:
        - name: venue_id
          in: query
          required: true
          schema:
            type: string
          description: ID of the venue to check slots for
          example: v1
        - name: meeting_date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: The meeting date to check
          example: "2026-08-15"
      responses:
        200:
          description: List of taken meeting time strings for the given venue and date
          content:
            application/json:
              schema:
                type: object
                properties:
                  taken_slots:
                    type: array
                    items:
                      type: string
                    example: ["10:00 AM", "11:00 AM", "02:00 PM"]
        400:
          description: Missing required query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Bad request
                message: venue_id and meeting_date are required
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token

  /bookings/{booking_id}:
    get:
      tags: [Bookings]
      summary: Get a single booking by ID
      description: |
        Manager and Admin can view any booking.
