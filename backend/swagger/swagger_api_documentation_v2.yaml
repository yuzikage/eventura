        404:
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not found
                message: Booking with id xyz does not exist

  # ── ADMIN ─────────────────────────────────────────────────────

  /admin/revenue:
    get:
      tags: [Admin]
      summary: Get monthly revenue report
      description: |
        Admin only. Returns revenue grouped by month.
        `total_revenue` per month = confirmed + pending only (cancelled excluded).
        `confirmed_revenue` per month = confirmed only.
        Months with no bookings are zero-filled. Always sorted oldest → newest.
        Used by the admin revenue reports section.
        Maps to user story **US-A2**.
      security:
        - BearerAuth: []
      x-required-roles: [admin]
      parameters:
        - name: months
          in: query
          required: false
          schema:
            type: integer
            default: 6
            minimum: 1
            maximum: 24
          description: Number of past months to include in the report
      responses:
        200:
          description: Monthly revenue data
          content:
            application/json:
              schema:
                type: object
                properties:
                  revenue:
                    type: array
                    items:
                      type: object
                      properties:
                        month:
                          type: string
                          example: "2026-03"
                        total_revenue:
                          type: number
                          description: Confirmed + pending revenue for the month (excludes cancelled)
                          example: 295000.0
                        confirmed_revenue:
                          type: number
                          description: Confirmed revenue only for the month
                          example: 220000.0
                        booking_count:
                          type: integer
                          description: Non-cancelled booking count for the month
                          example: 6
                        avg_per_booking:
                          type: number
                          description: total_revenue divided by non-cancelled booking count
                          example: 49166.67
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token
        403:
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Forbidden
                message: You do not have permission to view these details

  /admin/stats:
    get:
      tags: [Admin]
      summary: Get overall business statistics
      description: |
        Admin only. Returns total bookings, status breakdown,
        projected revenue (confirmed + pending, excludes cancelled),
        and confirmed revenue.
        Used by the admin dashboard overview stat cards.
        Maps to user story **US-A1**.
      security:
        - BearerAuth: []
      x-required-roles: [admin]
      responses:
        200:
          description: Business statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_bookings:
                    type: integer
                    example: 24
                  confirmed:
                    type: integer
                    example: 18
                  pending:
                    type: integer
                    example: 4
                  cancelled:
                    type: integer
                    example: 2
                  projected_revenue:
                    type: number
                    description: Total estimated cost of all confirmed + pending bookings (excludes cancelled)
                    example: 1445000.0
                  confirmed_revenue:
                    type: number
                    description: Total estimated cost of confirmed bookings only
                    example: 1230000.0
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token
        403:
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Forbidden
                message: You do not have permission to view these details

  # ── CHAT ──────────────────────────────────────────────────────

  /chat:
    post:
      tags: [Chat]
      summary: Send a message to the AI assistant
      description: |
        Authenticated users only (all roles). Sends the full conversation
        history to Claude Haiku and returns the AI reply.

        The system prompt is built dynamically on every request — it fetches
        live venues, themes, and packages from the database so the AI always
        has current information.

        Always send the complete message history (all prior user and assistant
        turns), not just the latest message. This preserves conversation context.

        Maps to user story **US-C3**.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            example:
              messages:
                - role: user
                  content: What venues do you have?
      responses:
        200:
          description: AI reply successfully generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
              example:
                reply: "We currently have **The Grand Pavilion** (capacity 500, ₹1,20,000) and **The Garden Terrace** (capacity 200, ₹75,000) available."
        400:
          description: Missing or invalid messages array
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Bad request
                message: messages must be a non-empty array
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token
        429:
          description: AI service rate limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Too many requests
                message: AI service rate limit reached
        503:
          description: AI service unavailable or not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Service unavailable
                message: AI chat is not configured on this server

  # ── AI ────────────────────────────────────────────────────────
 
  /ai/recommend:
    post:
      tags: [AI]
      summary: Get an AI-powered event recommendation
      description: |
        Customer only. Accepts a natural language event description and guest
        count, queries the live catalogue (venues, themes, all package types),
        and returns a fully specified recommendation with one item from each
        category plus a reason for each choice.
 
        The response includes the full database object for every recommended
        item so the frontend can directly apply the selection to wizard state
        without additional API calls.
 
        **Edge case handling:**
        - If the description is unrelated to event planning, returns 400 with
          a helpful message asking the customer to describe their event.
        - If the stated budget cannot cover even the cheapest possible
          combination, `budget_warning` is populated.
        - If no venue fits the guest count, `capacity_warning` is populated
          and the largest available venue is recommended.
        - If the AI recommends a venue whose capacity is below the guest count
          but a fitting venue exists, the backend silently swaps to the
          cheapest fitting venue before responding.
 
        Maps to user story **US-C7**.
      security:
        - BearerAuth: []
      x-required-roles: [customer]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIRecommendRequest'
            example:
              description: "Outdoor wedding for family and friends, warm colours, budget around ₹2 lakhs"
              guest_count: 120
              event_type: Wedding
      responses:
        200:
          description: Recommendation generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIRecommendResponse'
              example:
                is_relevant: true
                venue:
                  id: v1
                  name: The Grand Pavilion
                  reason: "Fits 120 guests comfortably with room for a stage setup."
                  full: { id: v1, name: "The Grand Pavilion", location: "Coochbehar Central", capacity: 300, price: 120000.0, is_available: true }
                theme:
                  id: t1
                  name: Royal Marigold
                  reason: "Warm gold tones perfectly suit an outdoor wedding aesthetic."
                  full: { id: t1, name: "Royal Marigold", description: "Warm golds and deep saffron", is_active: true }
                guest_count: 120
                event_package:
                  id: pk2
                  label: Premium
                  reason: "Upgraded florals and two coordinators suit a wedding of this size."
                  full: { id: pk2, label: "Premium", price: 35000.0, is_active: true }
                photography:
                  id: ph2
                  label: Cinematic
                  reason: "Full-day coverage ensures every moment is captured."
                  full: { id: ph2, label: "Cinematic", price: 32000.0, is_active: true }
                catering:
                  id: c2
                  label: Royal Feast
                  reason: "Multi-cuisine spread suits a diverse wedding guest list."
                  full: { id: c2, label: "Royal Feast", price_per_head: 950.0, is_active: true, pricePerHead: 950.0 }
                summary: "A Premium wedding at The Grand Pavilion with Royal Marigold theme and full-day photography."
                budget_mentioned: 200000
                budget_warning: "The recommended combination totals ₹2,15,400, which is above your budget of ₹2,00,000. This is our closest match — your manager can help find 			adjustments during the consultation meeting."
                capacity_warning: null
                actual_total: 215400.0
        400:
          description: |
            Missing or invalid fields, or description is unrelated to event planning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Bad request
                message: "Your description doesn't seem to be about an event. Please tell us about the event you're planning."
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token
        403:
          description: Customer access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Forbidden
                message: You do not have permission to perform this action
        429:
          description: AI service rate limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Too many requests
                message: AI service rate limit reached
        503:
          description: AI service unavailable, not configured, or insufficient catalogue data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Service unavailable
                message: AI recommendation is not configured on this server
 
  /bookings/{booking_id}/review:
    get:
      tags: [AI]
      summary: Get an AI-generated review of a booking
      description: |
        Manager and Admin only. Returns an AI-generated structured assessment
        of the specified booking.
 
        The review includes:
        - A one-sentence summary referencing the booking reference and event type
        - A list of specific flags with actual values (e.g. guest count vs venue
          capacity, approaching event dates, missing meeting notes)
        - A suggested next action for the manager
 
        The review is generated fresh on every request. It does not affect
        booking data in any way.
 
        Maps to user story **US-M5**.
      security:
        - BearerAuth: []
      x-required-roles: [manager, admin]
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            type: string
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
      responses:
        200:
          description: AI review generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingReviewResponse'
              example:
                summary: "EVT-A3F2K is a confirmed wedding booking at The Grand Pavilion with strong package selections."
                flags:
                  - "Guest count of 280 is close to venue capacity of 300 — discuss seating arrangements."
                  - "Event date is in 10 days — confirm all vendor arrangements immediately."
                suggestion: "Call the customer before the meeting on 2026-08-15 to confirm the outdoor setup preference."
        200_no_flags:
          description: AI review with no flags (all looks good)
          content:
            application/json:
              example:
                summary: "EVT-B7K2M is a pending birthday booking at The Garden Terrace for 80 guests."
                flags: []
                suggestion: "Confirm the booking and reach out to the customer to schedule the consultation."
        401:
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Unauthorized
                message: Missing or invalid token
        403:
          description: Manager or Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Forbidden
                message: You do not have permission to perform this action
        404:
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not found
                message: Booking with id xyz does not exist
        429:
          description: AI service rate limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Too many requests
                message: AI service rate limit reached
        503:
          description: AI service unavailable or not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Service unavailable
                message: AI review is not configured on this server